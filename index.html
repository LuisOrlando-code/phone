<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Dynamic Island</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Selector de colores -->
    <input type="radio" name="theme" id="purple" checked>
    <input type="radio" name="theme" id="gold">
    <input type="radio" name="theme" id="black">
    <input type="radio" name="theme" id="silver">

    <!-- Teléfono -->
    <div class="phone">
        <div class="screen">
            <div class="dynamic-island">
                <div class="content">
                    <div class="left">
                        <div class="album"></div>
                        <div class="info">
                            <span>Music Name</span>
                            <small>Artist</small>
                        </div>
                    </div>
                    <div class="right">
                        <div class="bar">
                            <div class="progress"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Paleta -->
    <div class="palette">
        <label for="purple"></label>
        <label for="gold"></label>
        <label for="black"></label>
        <label for="silver"></label>
    </div>

</body>
</html>
